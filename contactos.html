<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto de Emergencia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <section class="contacto-emergencia-section">
    <h2>Contacto de Emergencia</h2>
    <form id="contacto-emergencia-form">
      <input type="text" name="nombre-contacto" placeholder="Nombre del contacto" required>

      <select name="relacion-contacto" required>
        <option value="">Selecciona relación</option>
        <option value="Madre">Madre</option>
        <option value="Padre">Padre</option>
        <option value="Hermano/a">Hermano/a</option>
        <option value="Pareja">Pareja</option>
        <option value="Amigo/a">Amigo/a</option>
        <option value="Otro">Otro</option>
      </select>

      <input type="tel" name="telefono-contacto" placeholder="Teléfono (10 dígitos)" pattern="[0-9]{10}" required>

      <button type="submit" class="contacto-emergencia-btn">Guardar Contacto</button>
    </form>
  </section>

  <p style="text-align: center; margin-top: 1rem;">
    ¿Ya tienes cuenta?
    <a href="login.html">Inicia sesión</a>
  </p>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('contacto-emergencia-form');
  
      form.addEventListener('submit', (e) => {
        e.preventDefault();
  
        const nombre = form["nombre-contacto"].value.trim();
        const telefono = form["telefono-contacto"].value.trim();
        const relacion = form["relacion-contacto"].value;
  
        const nombreUsuario = localStorage.getItem('nombreUsuario') || "usuario";
  
        if (!/^\d{10}$/.test(telefono)) {
          alert("El teléfono debe tener exactamente 10 dígitos.");
          return;
        }
  
        if (!nombre || !relacion) {
          alert("Por favor completa todos los campos.");
          return;
        }
  
        // Mostrar mensaje completo y personalizado
        alert(`¡Registro completo!\n${nombreUsuario} fue registrado con éxito junto a su contacto "${nombre}".`);
  
        // Limpiar datos temporales y redirigir
        localStorage.clear();
        form.reset();
        window.location.href = "login.html";
      });
    });
  </script>
  

</body>
</html>
