<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protección Segura</title>
  <link rel="stylesheet" href="styles/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <div class="logo">
      <h1><span>Proteccion Segura</span></h1>
    </div>
    <!-- Botón para mostrar/ocultar la navegación en móviles -->
    <button class="nav-toggle" aria-label="Toggle navigation">
      ☰
    </button>
    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="contactos.html">Contacto de Emergencia</a></li>
        <li><a href="encuesta.html">Encuesta de Acoso</a></li>
        <li><a href="login.html">Iniciar Sesión</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="panico-section">
      <div class="panic-button-container">
        <div class="card">
          <button id="boton-panico">¡PÁNICO!</button>
          <p>Presiona el botón para realizar el reporte.</p>
        </div>
      </div>
    </section>
  </main>

  <!-- ===== MODAL DE EMERGENCIA ===== -->
  <div id="modal-emergencia" class="modal hidden">
    <div class="modal-content">
      <h2>¿Qué tipo de situación enfrentas?</h2>
      <p>Selecciona una opción para enviar la alerta.</p>
      <button id="btn-leve">Acoso leve</button>
      <button id="btn-grave">Acoso grave</button>
      <button class="secondary" id="cerrar-modal">Cancelar</button>
    </div>
  </div>

</body>
</html>
