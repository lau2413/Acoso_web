<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - Paso 1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
</head>
<body>

  <section class="registro-section">
    <h2>Registro de Usuario</h2>
    <form id="registro-form">
      <input type="text" id="nombre" name="nombre" placeholder="Nombre completo" required>
      <input type="email" id="email" name="email" placeholder="Correo electrónico" required>
      <input type="tel" id="telefono" name="telefono" placeholder="Teléfono (10 dígitos)" pattern="[0-9]{10}" required>
      <input type="password" id="contrasena" name="contrasena" placeholder="Contraseña" required>
      <button type="submit">Continuar</button>
    </form>
  </section>

  <p style="text-align: center; margin-top: 1rem;">
    ¿Ya tienes una cuenta?
    <a href="login.html">Inicia sesión</a>
  </p>

  <!-- Guardado local temporal -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('registro-form');

      form.addEventListener('submit', (e) => {
        e.preventDefault();

        const nombre = document.getElementById('nombre').value.trim();
        const email = document.getElementById('email').value.trim();
        const telefono = document.getElementById('telefono').value.trim();
        const contrasena = document.getElementById('contrasena').value.trim();

        if (!nombre || !email || !telefono || !contrasena) {
          alert("Por favor completa todos los campos.");
          return;
        }

        if (!/^\d{10}$/.test(telefono)) {
          alert("El teléfono debe tener exactamente 10 dígitos.");
          return;
        }

        // Hash de contraseña
        const hash = bcrypt.hashSync(contrasena, 10);

        // Guardar en localStorage temporalmente
        localStorage.setItem('nombreUsuario', nombre);
        localStorage.setItem('correoUsuario', email);
        localStorage.setItem('telefonoUsuario', telefono);
        localStorage.setItem('contrasenaUsuario', hash);

        // Ir al paso 2
        window.location.href = "contactos.html";
      });
    });
  </script>

</body>
</html>
